name: Deploy to Submission Portal Azure App

on:
  push:
    branches: [ n0mzee/dev ]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      AZURE_WEBAPP_NAME: 'subm-frontend-dev'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Matches your Terraform config
          cache: 'npm'

      - name: Build Next.js App
        run: |
          npm install
          npm run build
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static          
          cd .next/standalone
          zip -r ../../release.zip .
            
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}

          package: release.zip
